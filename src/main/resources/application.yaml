spring:
  application:
    name: periodt-backend

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ── JPA / Hibernate ───────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    #   a DB connection open for the full HTTP request.
    properties:
      hibernate:
        format_sql: true
    show-sql: true

  # ── Flyway ────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false
# ── .env file support ─────────────────────────────────────────────────────
spring.config.import: optional:file:.env[.properties]

# ── Logging ───────────────────────────────────────────────────────────────
logging:
  level:
    org.flywaydb: DEBUG          # see Flyway's full output
    org.hibernate.SQL: DEBUG     # see generated SQL
    com.ben.periodt: DEBUG       # your app package

# ── Security ──────────────────────────────────────────────────────────────
security:
  jwt:
    secret: ${JWT_SECRET}
    access-expiration: ${JWT_ACCESS_EXPIRATION_MS}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION_MS}

